# This Secret is a reference template only.
# Do NOT store real values here — this file shows the required keys.
# Provision actual secret values via:
#   - kubectl create secret generic foreman-secrets --from-literal=...
#   - External Secrets Operator pointing at Vault / AWS Secrets Manager
#   - Sealed Secrets (kubeseal)
#
# Required keys:
#   database-url                 — postgresql+asyncpg://user:pass@host/db
#   jwt-secret-key               — random 32+ byte hex string
#   openai-api-key               — sk-...
#   google-business-access-token — OAuth2 access token
#   mollie-api-key               — live_... or test_...
#   mollie-webhook-secret        — random secret used to verify Mollie webhook signatures
#   postgresql-admin-password    — postgres superuser password (used by bitnami subchart)
#   postgresql-password          — foreman app user password (used by bitnami subchart)
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "foreman.secretName" . }}
  labels:
    {{- include "foreman.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
# data: values are base64-encoded and must be provided externally.
# This chart does not render secret values — the Secret object is created
# as a stub so dependent resources can reference it. Populate via CI/CD or
# external secrets before deploying.
data: {}
