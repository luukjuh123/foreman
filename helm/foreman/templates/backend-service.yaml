apiVersion: v1
kind: Service
metadata:
  name: {{ include "foreman.fullname" . }}-backend
  labels:
    {{- include "foreman.backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "foreman.backend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.targetPort }}
      protocol: TCP
